<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C:\Windows\System32\cmd.exe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }

  /* ── CMD WINDOW ── */
  #cmd-window {
    width: 830px;
    height: 520px;
    display: flex;
    flex-direction: column;
    border: 1px solid #444;
    box-shadow: 0 8px 40px rgba(0,0,0,0.85);
  }

  /* Title bar */
  #title-bar {
    height: 30px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 10px;
    flex-shrink: 0;
    border-bottom: 1px solid #000;
  }
  #title-bar .ico { width:16px; height:16px; background:#888; margin-right:8px; font-size:11px; display:flex; align-items:center; justify-content:center; }
  #title-bar .ttl { color: #ccc; font-size: 12px; flex: 1; letter-spacing: 0.3px; }
  .wb { width:46px; height:30px; border:none; background:transparent; color:#bbb; font-size:14px; cursor:pointer; }
  .wb:hover { background:#3a3a3a; }
  .wb.cl:hover { background:#c42b1c; color:#fff; }

  /* Terminal area */
  #term {
    flex: 1;
    background: #0c0c0c;
    color: #cccccc;
    font-family: Consolas, "Courier New", monospace;
    font-size: 14px;
    line-height: 1.3;
    padding: 5px 8px;
    overflow: hidden;
    position: relative;
  }
  #out { white-space: pre-wrap; word-break: break-all; }
  #caret {
    display: inline-block;
    width: 8px; height: 15px;
    background: #cccccc;
    vertical-align: text-bottom;
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── JUMPSCARE OVERLAY ── */
  #scare {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 998;
    overflow: hidden;
  }
  #scare img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0%) contrast(180%) brightness(80%);
    animation: thrash 0.08s linear infinite;
    transform-origin: center;
  }
  @keyframes thrash {
    0%   { transform: translate(-8px, 6px) rotate(-1.5deg) scale(1.04); filter: hue-rotate(0deg) saturate(0%) contrast(200%) brightness(60%); }
    20%  { transform: translate(10px,-8px) rotate(2deg)   scale(1.06); filter: hue-rotate(180deg) saturate(200%) contrast(300%) brightness(120%); }
    40%  { transform: translate(-6px, 4px) rotate(-2.5deg) scale(1.02); filter: hue-rotate(0deg) saturate(0%) contrast(200%) brightness(50%); }
    60%  { transform: translate(8px, -5px) rotate(1.5deg)  scale(1.05); filter: hue-rotate(90deg) saturate(300%) contrast(250%) brightness(100%); }
    80%  { transform: translate(-10px,8px) rotate(-1deg)   scale(1.07); filter: hue-rotate(0deg) saturate(0%) contrast(200%) brightness(70%); }
    100% { transform: translate(5px, -6px) rotate(2deg)    scale(1.03); filter: hue-rotate(270deg) saturate(200%) contrast(300%) brightness(110%); }
  }
  /* Red flash strips that appear on top of the image */
  #flash-strips {
    position: fixed; inset: 0; z-index: 999;
    pointer-events: none;
    animation: flashRed 0.1s linear infinite;
  }
  @keyframes flashRed {
    0%,100% { background: transparent; }
    50%     { background: rgba(180, 0, 0, 0.45); }
  }

  /* ── SAFE SCREEN ── */
  #safe {
    display: none;
    position: fixed; inset: 0;
    background: #0a0a0a;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    cursor: auto;
  }
  #safe div { text-align: center; }
  #safe h1 { font-size: 2rem; color: #4caf50; font-weight: 300; margin-bottom: 10px; font-family: 'Segoe UI', sans-serif; }
  #safe p  { color: #555; font-size: 0.95rem; font-family: 'Segoe UI', sans-serif; }

  /* Screen shake class applied to body */
  .shake-body { animation: bodyShake 0.15s linear infinite; }
  @keyframes bodyShake {
    0%   { transform: translate(-4px, 3px); }
    25%  { transform: translate(5px, -4px); }
    50%  { transform: translate(-5px,-3px); }
    75%  { transform: translate(4px,  5px); }
    100% { transform: translate(-4px, 3px); }
  }
</style>
</head>
<body>

<!-- Fake Windows CMD Window -->
<div id="cmd-window">
  <div id="title-bar">
    <div class="ico">▪</div>
    <div class="ttl">Administrator: C:\Windows\System32\cmd.exe</div>
    <button class="wb">─</button>
    <button class="wb">□</button>
    <button class="wb cl">✕</button>
  </div>
  <div id="term">
    <div id="out"></div>
    <span id="caret"></span>
  </div>
</div>

<!-- Jumpscare face -->
<div id="scare">
  <img src="scare.png" alt="" id="scare-img">
  <div id="flash-strips"></div>
</div>

<!-- Safe end screen -->
<div id="safe">
  <div>
    <h1>😌 Relax — it's just a prank!</h1>
    <p>No files were touched. Your system is perfectly fine.</p>
  </div>
</div>

<script>
  // ───────── Navigation lock ─────────
  // Push a dummy state so back button has nowhere useful to go
  history.pushState(null, '', window.location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', window.location.href);
  });

  // Block right-click
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Block F5, Ctrl+R, Alt+Left (back), Backspace navigation
  document.addEventListener('keydown', e => {
    const blocked = [
      e.key === 'F5',
      e.key === 'r' && (e.ctrlKey || e.metaKey),
      e.key === 'ArrowLeft' && e.altKey,
      e.key === 'Backspace' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)
    ];
    if (blocked.some(Boolean)) e.preventDefault();
  }, true);

  // ───────── Helpers ─────────
  const out   = document.getElementById('out');
  const caret = document.getElementById('caret');
  const scare = document.getElementById('scare');
  const safe  = document.getElementById('safe');

  let alive = true;
  let scareShown = false; // ESC only works after jumpscare
  const USER = (navigator.userAgent.match(/Windows NT/) ? "USER" : "USER");

  function w(text) { if (alive) { out.textContent += text; scrollToBottom(); } }
  function wl(t='') { w(t + '\n'); }
  function scrollToBottom() {
    const term = document.getElementById('term');
    term.scrollTop = term.scrollHeight;
  }
  function rnd(a,b) { return a + Math.floor(Math.random() * (b - a)); }
  function wait(ms) { return new Promise(res => setTimeout(res, ms)); }

  // ───────── Web Audio Screech ─────────
  function playScream() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // White noise burst
    const bufLen = ctx.sampleRate * 2.5;
    const buffer = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data   = buffer.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      // Fade in quickly, hold, fade out
      const t = i / bufLen;
      const env = t < 0.02 ? t / 0.02 : t > 0.7 ? (1 - (t - 0.7) / 0.3) : 1;
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    // Distortion for harshness
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = (Math.PI + 400) * x / (Math.PI + 400 * Math.abs(x)); }
    dist.curve = curve;

    // Low frequency thump
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 1.5);
    const oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.6, ctx.currentTime);
    oscGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);

    const gainNode = ctx.createGain();
    gainNode.gain.value = 1.8; // LOUD
    noise.connect(dist);
    dist.connect(gainNode);
    gainNode.connect(ctx.destination);

    noise.start();
    osc.start();
    noise.stop(ctx.currentTime + 2.5);
    osc.stop(ctx.currentTime + 2.5);
  }

  // ───────── Fake files ─────────
  const dirs = [
    `C:\\Users\\${USER}\\Documents\\`,
    `C:\\Users\\${USER}\\Desktop\\`,
    `C:\\Users\\${USER}\\Downloads\\`,
    `C:\\Users\\${USER}\\Pictures\\`,
    `C:\\Users\\${USER}\\AppData\\Roaming\\Microsoft\\Credentials\\`,
    `C:\\Windows\\System32\\`,
    `C:\\Windows\\System32\\config\\`,
  ];
  const fnames = [
    "Passwords","Tax_Return_2024","Resume_FINAL","Family_Photos_Backup","id_proof_scan",
    "salary_record","bank_details","privatekeys","photos_2024","ntdll","kernel32",
    "SAM","SYSTEM","SOFTWARE","SECURITY","lsass","winlogon","svchost","hal"
  ];
  const exts = [".docx",".pdf",".xlsx",".txt",".jpg",".png",".sys",".dll",""];

  function fakeFile() {
    const d = dirs[rnd(0, dirs.length)];
    let n = fnames[rnd(0, fnames.length)];
    if (d.includes("System32") || d.includes("config")) {
      return d + ["ntdll","kernel32","hal","SAM","SYSTEM","lsass","winlogon","svchost"][rnd(0,8)]
               + [".dll",".sys",".exe",""][rnd(0,4)];
    }
    return d + n + (rnd(0,2) ? "_" + rnd(1,999) : "") + exts[rnd(0, exts.length)];
  }

  // ───────── Type text as if a human typed it ─────────
  async function typeCmd(prompt, cmd) {
    w(prompt);
    for (const ch of cmd) {
      if (!alive) return;
      w(ch);
      await wait(rnd(28, 105));
    }
    await wait(rnd(280, 500));
    w('\n');
  }

  // ───────── Jumpscare ─────────
  function triggerJumpscare() {
    alive = false;
    caret.style.display = 'none';
    document.body.classList.add('shake-body');
    playScream();
    scare.style.display = 'block';
  }

  // ───────── Main sequence ─────────
  async function main() {
    await wait(400);
    wl("Microsoft Windows [Version 10.0.19045.4651]");
    wl("(c) Microsoft Corporation. All rights reserved.");
    wl();

    // User types del command with personal folder
    await typeCmd(`C:\\Users\\${USER}>`, `cd \\Windows\\System32`);
    await typeCmd(`C:\\Windows\\System32>`, `del /f /s /q "C:\\Users\\${USER}"`);

    await wait(600);
    wl();
    wl(`C:\\Users\\${USER}\\Desktop\\Passwords.txt`);
    await wait(350);

    let delay = 500;
    // Phase 1: slow, recognizable personal files — most disturbing
    for (let i = 0; i < 8; i++) {
      if (!alive) return;
      wl(fakeFile());
      await wait(delay);
      delay = Math.max(55, delay * 0.80);
    }

    wl();
    wl("Cannot read file system. Attempting write override...");
    await wait(700);
    wl("Override accepted. Continuing purge...");
    wl();
    await wait(500);

    // Phase 2: faster — system files mix in
    delay = 45;
    for (let i = 0; i < 40; i++) {
      if (!alive) return;
      wl(fakeFile());
      await wait(delay + Math.random() * 15);
    }

    if (!alive) return;

    // Phase 3: it goes red and error floods
    out.style.color = "#cc0000";
    wl();
    wl("KERNEL32.DLL — Access violation at 0x7FFDE000");
    await wait(500);
    wl("ntdll.dll — Fatal read error.");
    await wait(400);
    wl("DISK I/O ERROR: sector 0x0000007E unrecoverable.");
    await wait(600);
    wl();
    wl("CRITICAL_PROCESS_DIED — stopping all threads.");
    await wait(700);

    // Phase 4: Garbage corruption
    for (let i = 0; i < 20; i++) {
      if (!alive) return;
      let g = '';
      for (let j = 0; j < rnd(30, 100); j++) g += String.fromCharCode(rnd(33, 126));
      wl(g);
      await wait(10);
    }

    if (!alive) return;

    // Black flash, then JUMPSCARE
    document.getElementById('cmd-window').style.display = 'none';
    document.body.style.background = '#000';
    await wait(1000); // builds tension — silence / black screen

    scareShown = true;
    triggerJumpscare();
  }

  main();

  // ───────── ESC exits — only after jumpscare ─────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && scareShown) {
      alive = false;
      document.getElementById('cmd-window').style.display = 'none';
      scare.style.display = 'none';
      document.body.classList.remove('shake-body');
      document.body.style.background = '#0a0a0a';
      safe.style.display = 'flex';
      document.body.style.cursor = 'auto';
    }
  });
</script>
</body>
</html>
